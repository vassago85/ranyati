services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ranyati-app:latest
    container_name: ranyati-app
    restart: unless-stopped
    ports:
      - "8087:80"
    environment:
      - APP_NAME=Ranyati Group
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-https://ranyati.co.za}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-ranyati}
      - DB_USERNAME=${DB_USERNAME:-ranyati}
      - DB_PASSWORD=${DB_PASSWORD}
      - SESSION_DRIVER=database
      - MAIL_MAILER=${MAIL_MAILER:-mailgun}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@ranyati.co.za}
      - MAIL_FROM_NAME=Ranyati Group
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN}
      - MAILGUN_SECRET=${MAILGUN_SECRET}
      - MAILGUN_ENDPOINT=${MAILGUN_ENDPOINT:-api.eu.mailgun.net}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - app-logs:/var/www/html/storage/logs
    networks:
      - ranyati-network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: ranyati-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE:-ranyati}
      - MYSQL_USER=${DB_USERNAME:-ranyati}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - ranyati-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ranyati-network:
    driver: bridge

volumes:
  app-logs:
  db-data:
